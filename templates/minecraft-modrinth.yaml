id: minecraft-modrinth
name: Minecraft Modpack (Modrinth)
game: minecraft
category: Modded
description: >-
  Run any Minecraft modpack from Modrinth — paste the modpack's URL or slug and
  GameNest auto-downloads and installs it (Forge/Fabric/Quilt handled for you).
  No account or API key needed.
icon: minecraft
image: itzg/minecraft-server:latest
runtime: java
stopCommand: stop
dataPath: /data
commandMethod: rcon-cli
minMemoryMB: 3072
recMemoryMB: 6144
ports:
  - name: game
    container: 25565
    protocol: tcp
    default: 25565
env:
  EULA: "TRUE"
  TYPE: MODRINTH
variables:
  - key: MODRINTH_MODPACK
    label: Modrinth modpack
    description: Slug or URL, e.g. cobblemon-fabric or https://modrinth.com/modpack/cobblemon-fabric
    default: ""
    type: string
    required: true
  - key: VERSION
    label: Minecraft version
    description: LATEST, or pin to the pack's version (e.g. 1.21.1)
    default: LATEST
    type: string
    required: false
  - key: MEMORY
    label: Java heap
    description: JVM heap, e.g. 4G — keep it a bit below the Memory (MB) setting
    default: 4G
    type: string
    required: false
  - key: MOTD
    label: Server message (MOTD)
    default: A GameNest modpack server
    type: string
    required: false
