id: mordhau
name: Mordhau
game: mordhau
category: Shooter
description: >-
  Medieval melee combat multiplayer. Dedicated server (cm2network), auto-updates
  on start.
icon: mordhau
steamAppId: 629760
image: cm2network/mordhau:latest
runtime: steamcmd
stopCommand: ""
dataPath: /home/steam/mordhau-dedicated
commandMethod: ""
minMemoryMB: 2048
recMemoryMB: 4096
ports:
  - name: game
    container: 7777
    protocol: udp
    default: 7777
  - name: query
    container: 27015
    protocol: udp
    default: 27015
  - name: beacon
    container: 15000
    protocol: udp
    default: 15000
env: {}
variables:
  - key: SERVER_NAME
    label: Server Name
    description: Name shown in the in-game server browser.
    default: GameNest Mordhau
    type: string
    required: true
  - key: SERVER_PW
    label: Password
    description: Join password. Leave empty for a public server.
    default: ""
    type: string
    required: false
  - key: SERVER_ADMINPW
    label: Admin Password
    description: Admin password for in-game admin commands.
    default: ""
    type: string
    required: false
  - key: SERVER_MAXPLAYERS
    label: Max Players
    default: "32"
    type: int
    required: false
